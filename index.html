<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Simulator Pro</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        header { text-align: center; margin-bottom: 25px; }
        h1 { margin: 0; color: var(--primary); font-size: 1.8rem; }
        p.subtitle { color: #64748b; margin-top: 5px; font-size: 0.9rem; }

        /* Scanning Animation */
        #status-message {
            text-align: center;
            padding: 20px;
            color: #64748b;
            font-style: italic;
        }

        /* WiFi Card Layout */
        .wifi-card {
            background: var(--card);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .wifi-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .wifi-card.selected { border-color: var(--primary); background: #f0f7ff; }

        .wifi-name { font-weight: 700; font-size: 1.1rem; display: block; }
        .wifi-sec { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; }

        /* Signal Badge */
        .badge {
            padding: 6px 14px;
            border-radius: 20px;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .bg-strong { background-color: var(--success); }
        .bg-medium { background-color: var(--warning); }
        .bg-weak { background-color: var(--danger); }

        /* Password Panel */
        #password-panel {
            margin-top: 25px;
            padding: 25px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pass-item {
            background: #f8fafc;
            padding: 12px 15px;
            margin: 10px 0;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e2e8f0;
            cursor: copy;
        }

        .pass-item:hover { background: #f1f5f9; }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        /* Responsive Fix */
        @media (max-width: 400px) {
            h1 { font-size: 1.5rem; }
            .wifi-card { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>WiFi Scanner</h1>
        <p class="subtitle">Simulasi Jaringan Terdekat</p>
    </header>
    
    <div id="status-message">Menyiapkan modul WiFi...</div>
    <div id="wifi-list"></div>

    <div id="password-panel">
        <h3 id="target-ssid" style="margin: 0 0 5px 0;">-</h3>
        <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 15px;">Klik password untuk simulasi koneksi:</p>
        
        <div id="pass-list"></div>
        
        <button onclick="generatePasswords()">Generate Password Baru</button>
    </div>
</div>

<script>
    const networks = [
        { ssid: "IndiHome_77BE", signal: "Kuat", level: "strong", sec: "WPA2" },
        { ssid: "Starbucks_Free", signal: "Sedang", level: "medium", sec: "Open" },
        { ssid: "Admin_Room", signal: "Kuat", level: "strong", sec: "WPA3" },
        { ssid: "Gedung_B_Lantai2", signal: "Lemah", level: "weak", sec: "WPA2" },
        { ssid: "Personal_Hotspot", signal: "Sedang", level: "medium", sec: "WPA2" }
    ];

    const listElement = document.getElementById('wifi-list');
    const statusText = document.getElementById('status-message');
    const panel = document.getElementById('password-panel');

    // 1. Simulasi Scanning saat buka app
    function initScanner() {
        setTimeout(() => {
            statusText.innerText = "Memindai jaringan sekitar...";
            setTimeout(() => {
                statusText.style.display = 'none';
                renderWiFi();
            }, 1500);
        }, 800);
    }

    // 2. Tampilkan daftar Wi-Fi
    function renderWiFi() {
        networks.forEach((net) => {
            const card = document.createElement('div');
            card.className = 'wifi-card';
            card.onclick = () => selectNetwork(net.ssid, card);
            
            card.innerHTML = `
                <div>
                    <span class="wifi-name">${net.ssid}</span>
                    <span class="wifi-sec">${net.sec}</span>
                </div>
                <div class="badge bg-${net.level}">${net.signal}</div>
            `;
            listElement.appendChild(card);
        });
    }

    // 3. Pilih Jaringan
    function selectNetwork(ssid, el) {
        document.querySelectorAll('.wifi-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');

        document.getElementById('target-ssid').innerText = ssid;
        panel.style.display = 'block';
        generatePasswords();
        
        panel.scrollIntoView({ behavior: 'smooth' });
    }

    // 4. Generate Password Acak
    function generatePasswords() {
        const container = document.getElementById('pass-list');
        const charset = "abcdefghjkmnpqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        container.innerHTML = '';

        for (let i = 0; i < 3; i++) {
            let result = "";
            for (let j = 0; j < 10; j++) {
                result += charset.charAt(Math.floor(Math.random() * charset.length));
            }

            const item = document.createElement('div');
            item.className = 'pass-item';
            item.innerHTML = `<span>${result}</span> <span style="font-size:0.7rem; color:var(--primary)">PILIH</span>`;
            item.onclick = () => tryConnect(result);
            container.appendChild(item);
        }
    }

    // 5. Simulasi Koneksi
    function tryConnect(pwd) {
        const ssid = document.getElementById('target-ssid').innerText;
        alert(`Mencoba menyambungkan ke: ${ssid}\nKata sandi: ${pwd}`);
        
        // Simulasi delay koneksi
        setTimeout(() => {
            alert(`Berhasil! Perangkat Anda sekarang terhubung ke ${ssid}.`);
        }, 1000);
    }

    // Jalankan aplikasi
    initScanner();
</script>

</body>
</html>
